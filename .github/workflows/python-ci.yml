name: python-ci

on:
  push:
    paths: ["python/**", ".github/workflows/python-ci.yml"]
  pull_request:
    paths: ["python/**", ".github/workflows/python-ci.yml"]

defaults:
  run:
    working-directory: python

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.16"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync (locked)
        run: uv sync --locked
      - name: Lint
        run: |
          uv run ruff check app tests
          uv run black --check app tests
      - name: Typecheck
        run: uv run mypy app
      - name: Security
        run: uv run bandit -q -r app
      - name: Test (offline, coverage gate 80%)
        run: uv run pytest
