name: Deploy to Hugging Face Space

on:
  workflow_run:
    workflows: [python-ci]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-hf
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Provision GEMINI_API_KEY as a Space secret
        if: ${{ env.GEMINI_API_KEY != '' }}
        run: |
          pip install --quiet "huggingface_hub>=0.24"
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          HfApi(token=os.environ["HF_TOKEN"]).add_space_secret(
              repo_id=os.environ["HF_SPACE_ID"],
              key="GEMINI_API_KEY",
              value=os.environ["GEMINI_API_KEY"],
          )
          print("GEMINI_API_KEY set on", os.environ["HF_SPACE_ID"])
          PY

      - name: Push to Hugging Face Space
        run: |
          owner="${HF_SPACE_ID%%/*}"
          SPACE_URL="https://${owner}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"

          git clone "$SPACE_URL" /tmp/hf-space

          cd /tmp/hf-space
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "github-actions"

          cp "$GITHUB_WORKSPACE/streamlit_app.py" .
          cp "$GITHUB_WORKSPACE/requirements.txt" .
          cp "$GITHUB_WORKSPACE/README.md" .
          cp -r "$GITHUB_WORKSPACE/.streamlit/." .streamlit/
          cp -r "$GITHUB_WORKSPACE/python/." python/
          cp -r "$GITHUB_WORKSPACE/assets/." assets/

          git add -A
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Deploy from GitHub Actions (${GITHUB_SHA::7})"
          git push
